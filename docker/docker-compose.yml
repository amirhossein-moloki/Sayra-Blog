version: '3.8'
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: playnest-dev
      POSTGRES_PASSWORD: playnest-dev-password
      POSTGRES_DB: playnest-db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
