services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: playnest-app:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: always
    expose:
      - '3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
    volumes:
      - app_storage:/app/storage
    command: ["sh", "-c", "./scripts/migrate.sh && node dist/server.js"]

  nginx:
    image: playnest-nginx:latest
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: always
    ports:
      - '80:80'
    environment:
      - MEDIA_LOCAL_PUBLIC_PATH=/media
    volumes:
      - app_storage:/app/storage:ro
    depends_on:
      - app

  backup:
    image: playnest-backup:latest
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - RESTIC_REPOSITORY=/backups
      - BACKUP_CRON=0 * * * *
      - RETENTION_HOURLY=24
      - RETENTION_DAILY=7
      - RETENTION_WEEKLY=4
      - RETENTION_MONTHLY=12
    healthcheck:
      test: ["CMD-SHELL", "[ -f /var/log/last_success_backup ] && [ $$(($$(date +%s) - $$(cat /var/log/last_success_backup))) -lt 7200 ]"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - app_storage:/storage:ro
      - redis_data:/redis_data:ro
      - ./docker/nginx:/nginx_config:ro
      - ./backups:/backups
      - backup_data:/data
      - .env:/.env:ro
      - ./docker-compose.yml:/project_root/docker-compose.yml:ro
      - ./package.json:/project_root/package.json:ro

volumes:
  postgres_data:
  redis_data:
  app_storage:
  backup_data:
